version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yingmei-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yingmei123
      MYSQL_DATABASE: yingmei
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: yingmei-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  iopaint:
    image: sanster/iopaint:cpu-latest
    container_name: yingmei-iopaint
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - iopaint_cache:/root/.cache
    command: >
      iopaint start
      --host 0.0.0.0
      --port 8080
      --device cpu
      --model lama

volumes:
  mysql_data:
  redis_data:
  iopaint_cache:
